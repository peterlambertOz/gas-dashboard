server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use public DNS — resolves upstreams at request time, not startup
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Proxy AEMO GBB data requests to nemweb.com.au
    location /aemo/ {
        set $upstream https://www.nemweb.com.au;
        proxy_pass $upstream/;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_redirect default;
        proxy_set_header Host www.nemweb.com.au;
        proxy_set_header User-Agent Mozilla/5.0;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Referer "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # Proxy AEMO media file downloads (STTM, DWGM xlsx files on aemo.com.au)
    location /aemo-media/ {
        set $upstream2 https://www.aemo.com.au;
        proxy_pass $upstream2/-/media/;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_redirect default;
        proxy_set_header Host www.aemo.com.au;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Referer "https://www.aemo.com.au/";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin *;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
