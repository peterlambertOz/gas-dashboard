server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Market data files ─────────────────────────────────────────────────────
    # Downloaded fresh at each deploy by update-market-data.ps1.
    # Tell browsers never to cache so the dashboard always reads the latest
    # file written by the most recent deploy.
    location /data/ {
        autoindex on;
        autoindex_format json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ── AEMO media proxy (kept for any other uses) ────────────────────────────
    location /aemo-media/ {
        proxy_pass https://www.aemo.com.au/-/media/;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host www.aemo.com.au;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Referer "https://www.aemo.com.au/";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
    }

    # ── NEMWEB proxy (kept for any other uses) ────────────────────────────────
    location /aemo-proxy/ {
        proxy_pass https://www.nemweb.com.au/;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host www.nemweb.com.au;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Referer "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
        proxy_redirect off;
        proxy_max_temp_file_size 0;
    }

    location /aemo/ {
        proxy_pass https://www.nemweb.com.au/;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        proxy_set_header Host www.nemweb.com.au;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Referer "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
        proxy_redirect off;
        proxy_max_temp_file_size 0;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
